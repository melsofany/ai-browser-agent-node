services:
  - type: web
    name: CortexFlow
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    numInstances: 1
    disk:
      name: models-storage
      mountPath: /app/models
      sizeGB: 50
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: USE_LOCAL_MODELS
        value: "true"
      - key: DB_PATH
        value: /app/data/app.db
      - key: MODELS_PATH
        value: /app/models
    healthCheckPath: /health
    healthCheckInterval: 60
    healthCheckTimeout: 15
    healthCheckStartPeriod: 180
    healthCheckRetries: 3
