services:
  - type: web
    name: cortexflow
    env: docker
    plan: standard
    region: frankfurt
    branch: main
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: BROWSER_TIMEOUT
        value: 30000
      - key: MAX_CONCURRENT_TASKS
        value: 2
      - key: MEMORY_BACKEND
        value: sqlite
      - key: DB_PATH
        value: /app/data/app.db
      - key: MODELS_PATH
        value: /app/models
      - key: USE_LOCAL_MODELS
        value: false
      - key: GITHUB_TOKEN
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: RENDER_API_KEY
        sync: false
    disk:
      name: cortexflow-data
      mountPath: /app/data
      sizeGB: 1
