services:
  - type: web
    name: ai-browser-agent-node
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    numInstances: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: USE_LOCAL_MODELS
        value: "false"
      - key: DB_PATH
        value: /app/data/app.db
    healthCheckPath: /health
    healthCheckInterval: 60
    healthCheckTimeout: 10
    healthCheckStartPeriod: 120
    healthCheckRetries: 2
